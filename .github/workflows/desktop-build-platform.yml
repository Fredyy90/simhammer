name: Desktop Build (Platform)

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      os:
        required: true
        type: string
      version:
        required: false
        type: string
        default: ''
    secrets:
      CSC_LINK:
        required: false
      CSC_KEY_PASSWORD:
        required: false
      APPLE_ID:
        required: false
      APPLE_APP_SPECIFIC_PASSWORD:
        required: false
      APPLE_TEAM_ID:
        required: false

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # -- SimC (pre-built from sortbek/simc-builds) --
      - name: Resolve SimC version
        id: simc-version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(curl -fsSL -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/sortbek/simc-builds/tags?per_page=100" \
            | python3 -c "import sys,json; tags=json.load(sys.stdin); print(next(t['name'] for t in tags if t['name'].startswith('weekly-')))")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Cache SimC binary
        id: simc-cache
        uses: actions/cache@v4
        with:
          path: backend/resources/simc
          key: ${{ runner.os }}-simc-${{ steps.simc-version.outputs.tag }}

      - name: Download SimC
        if: steps.simc-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.simc-version.outputs.tag }}"
          REPO="sortbek/simc-builds"
          if [ "${{ inputs.platform }}" = "windows" ]; then
            ASSET="simc-windows-x64.zip"
          elif [ "${{ inputs.platform }}" = "macos" ]; then
            ASSET="simc-macos-arm64.tar.gz"
          else
            ASSET="simc-linux-x64.tar.gz"
          fi
          URL=$(curl -fsSL -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG" \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print(next(a['browser_download_url'] for a in r['assets'] if a['name']=='$ASSET'))")
          mkdir -p backend/resources/simc
          echo "Downloading $ASSET from $TAG..."
          curl -fsSL -o "${{ runner.temp }}/$ASSET" "$URL"
          if [[ "$ASSET" == *.zip ]]; then
            unzip -o "${{ runner.temp }}/$ASSET" -d backend/resources/simc
          else
            tar -xzf "${{ runner.temp }}/$ASSET" -C backend/resources/simc
          fi
          chmod +x backend/resources/simc/simc* 2>/dev/null || true

      # -- Game Data --
      - name: Fetch game data
        shell: bash
        run: |
          mkdir -p backend/resources/data-full
          cd backend/resources/data-full
          curl -sL -o metadata.json https://www.raidbots.com/static/data/live/metadata.json
          for f in $(node -e "const m=require('./metadata.json'); m.files.forEach(f=>console.log(f))"); do
            echo "  $f"
            curl -sL -o "$f" "https://www.raidbots.com/static/data/live/$f"
          done
          cp ../../core/season-config.json ./season-config.json 2>/dev/null || true
          curl -sL -o blizzard-season.json https://simhammer.com/api/blizzard/season || true
          curl -sL -o blizzard-instances.json https://simhammer.com/api/blizzard/instances || true

      - name: Compact game data
        shell: bash
        run: node backend/scripts/compact-data.js backend/resources/data-full backend/resources/data

      # -- Version --
      - name: Set version
        if: inputs.version != ''
        shell: bash
        run: |
          cd desktop
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ inputs.version }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # -- Frontend --
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      # -- Build --
      - name: Build frontend
        run: cd desktop && npm run build:frontend

      - name: Build backend
        run: cd desktop && npm run build:backend

      - name: Build installer
        run: cd desktop && npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ inputs.platform == 'macos' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ inputs.platform == 'macos' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ inputs.platform == 'macos' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ inputs.platform == 'macos' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ inputs.platform == 'macos' && secrets.APPLE_TEAM_ID || '' }}

      # -- Upload --
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simhammer-${{ inputs.platform }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/latest*.yml
            desktop/dist/*.blockmap
          if-no-files-found: error
