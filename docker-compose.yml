name: simhammer

services:
  backend:
    build:
      context: backend
      dockerfile: server/Dockerfile
      args:
        - SIMC_ENABLED_BRANCHES=${SIMC_ENABLED_BRANCHES:-weekly}
    ports:
      - "8000:8000"
    volumes:
      - simhammer-db:/app/db
    environment:
      - DATA_DIR=/app/resources/data
      - DATABASE_URL=/app/db/simhammer.db
      - PORT=8000
      - MAX_COMBINATIONS=2
      - MAX_SCENARIOS=0
      - SIMC_ENABLED_BRANCHES=${SIMC_ENABLED_BRANCHES:-weekly}
      - SIMC_CHECK_INTERVAL=${SIMC_CHECK_INTERVAL:-3600}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}

  frontend:
    build:
      context: frontend
      args:
        - NEXT_PUBLIC_API_URL=${SERVER_IP:-http://localhost:8000}
    ports:
      - "3000:3000"

  resources:
    profiles: ["desktop"]
    build:
      context: desktop
      dockerfile: Dockerfile.resources
    volumes:
      - ./backend/resources/data:/mount/data
    entrypoint: ["sh", "-c", "cp -r /out/data/* /mount/data/ && echo 'Resources ready.'"]


  standalone:
    profiles: ["standalone"]
    build:
      context: .
      dockerfile: Dockerfile.standalone
    ports:
      - "8000:8000"
    volumes:
      - simhammer-db:/app/db
    environment:
      - MAX_COMBINATIONS=2
      - MAX_SCENARIOS=0
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}

volumes:
  simhammer-db:
